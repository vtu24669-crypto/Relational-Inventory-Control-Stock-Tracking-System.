<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Campus Events</title>
</head>

<body>
    <div th:fragment="content">

        <div class="hero text-center shadow-sm">
            <h1 class="display-5 fw-bold">Discover Campus Events</h1>
            <p class="lead mb-4">Engage in workshops, seminars, and guest lectures happening around the university.</p>
        </div>

        <!-- Success Message -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
            Registration successful! You're booked for the event.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Filters -->
        <div class="card mb-4 shadow-sm border-0">
            <div class="card-body">
                <form class="row gy-2 gx-3 align-items-center" th:action="@{/events}" method="get">
                    <div class="col-auto">
                        <input type="date" name="date" class="form-control" placeholder="Select Date"
                            th:value="${param.date}">
                    </div>
                    <div class="col-auto">
                        <input type="text" name="department" class="form-control" placeholder="Department"
                            th:value="${param.department}">
                    </div>
                    <div class="col-auto">
                        <select name="type" class="form-select">
                            <option value="">All Types</option>
                            <option value="Technical Event"
                                th:selected="${param.type != null and param.type[0] == 'Technical Event'}">Technical
                                Event</option>
                            <option value="Cultural Event"
                                th:selected="${param.type != null and param.type[0] == 'Cultural Event'}">Cultural Event
                            </option>
                            <option value="Sports Event"
                                th:selected="${param.type != null and param.type[0] == 'Sports Event'}">Sports Event
                            </option>
                            <option value="Arts Event"
                                th:selected="${param.type != null and param.type[0] == 'Arts Event'}">Arts Event
                            </option>
                            <option value="Literary Event"
                                th:selected="${param.type != null and param.type[0] == 'Literary Event'}">Literary Event
                            </option>
                            <option value="Workshop"
                                th:selected="${param.type != null and param.type[0] == 'Workshop'}">Workshop</option>
                            <option value="Seminar" th:selected="${param.type != null and param.type[0] == 'Seminar'}">
                                Seminar</option>
                            <option value="Guest Lecture"
                                th:selected="${param.type != null and param.type[0] == 'Guest Lecture'}">Guest Lecture
                            </option>
                            <option value="Other" th:selected="${param.type != null and param.type[0] == 'Other'}">Other
                            </option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Filter</button>
                        <a th:href="@{/events}" class="btn btn-outline-secondary">Clear</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Event List -->
        <div th:if="${#maps.isEmpty(groupedEvents)}">
            <div class="alert alert-info border-0 shadow-sm text-center">No upcoming events found matching your
                criteria.</div>
        </div>

        <div th:each="entry : ${groupedEvents}" class="mb-5">
            <div class="d-flex align-items-center mb-3">
                <h2 class="h3 fw-bold mb-0 text-primary" th:text="${entry.key} + 's'">Event Type</h2>
                <div class="flex-grow-1 ms-3" style="height: 2px; background-color: #dee2e6;"></div>
            </div>

            <div class="row row-cols-1 row-cols-md-3 g-4">
                <div class="col" th:each="event : ${entry.value}">
                    <div class="card h-100 shadow-sm border-0 event-card" style="transition: transform 0.3s ease, box-shadow 0.3s ease;">
                        
                        <!-- Map specific event names to stunning, high-quality images automatically -->
                        <th:block th:with="mappedImage=${
                            event.name == 'Classical Natyam' ? '/images/classical_natyam.png' : 
                            event.name == 'Dance Competition' ? 'https://images.unsplash.com/photo-1547153760-18fc86324498?auto=format&fit=crop&w=800&q=80' : 
                            event.name == 'Robotic Workshop' ? '/images/robotic_workshop.png' : 
                            event.name == 'Hackathon' ? '/images/hackathon.png' : 
                            event.name == 'ECE Circuit Design Challenge' ? '/images/ece_circuit.png' : 
                            event.name == 'Coding Round' ? '/images/coding_round.png' : 
                            event.name == 'Treasure Hunting' ? '/images/treasure_hunting.png' : 
                            event.name == 'Basketball Championship' ? '/images/basketball.png' : 
                            event.name == 'Tug of War' ? '/images/tug_of_war.png' : 
                            event.name == 'Cricket Tournament' ? '/images/cricket.png' : 
                            event.name == 'Startup Pitch Deck' ? '/images/startup_pitch.png' : 
                            event.name == 'Singing Idol' ? 'https://loremflickr.com/800/400/singer' : 
                            (event.imageUrl != null and !event.imageUrl.isEmpty() ? event.imageUrl : 'https://picsum.photos/seed/' + event.id + '/800/400')
                        }">
                            <img th:src="${mappedImage}" 
                                 class="card-img-top object-fit-cover" 
                                 style="height: 200px;" 
                                 alt="Event Image">
                        </th:block>
                        
                        <div class="card-body position-relative">
                            <!-- Department Badge floating over image -->
                            <div class="position-absolute top-0 start-0 translate-middle-y ms-3">
                                <span class="badge bg-primary text-white px-3 py-2 shadow-sm rounded-pill" th:text="${event.department}">Dept</span>
                            </div>
                            
                            <h5 class="card-title text-dark fw-bold mt-2 mb-2" th:text="${event.name}">Event Name</h5>
                            
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <p class="card-text text-dark fw-semibold mb-0">
                                    <i class="bi bi-calendar-event text-info me-1"></i> <span th:text="${event.date}">Date</span>
                                </p>
                                <span class="badge bg-success bg-opacity-10 text-success border border-success rounded-pill px-3 py-1" 
                                      th:text="'₹' + (${event.ticketPrice != null and event.ticketPrice > 0} ? ${event.ticketPrice} : '100.0')">₹100</span>
                            </div>
                            
                            <p class="card-text text-muted small" th:text="${event.description}">Description...</p>
                        </div>
                        <div class="card-footer bg-white border-0 text-center pb-4 pt-0">
                            <a th:href="@{/events/{id}/register(id=${event.id})}"
                                class="btn btn-primary btn-sm w-100 fw-bold shadow-sm rounded-pill py-2">Register Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
