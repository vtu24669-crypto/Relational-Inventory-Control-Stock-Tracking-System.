<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Error</title>
</head>
<body>
<div th:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <h1 class="display-1 fw-bold text-danger">Oops!</h1>
            <h3 class="mb-4">Something went wrong.</h3>
            <p class="text-muted bg-light p-3 border rounded" th:if="${errorMessage}" th:text="${errorMessage}">Error description</p>
            <p th:if="${errorMessage == null}">An unexpected error occurred processing your request.</p>
            <a th:href="@{/}" class="btn btn-primary mt-3">Return to Home</a>
        </div>
    </div>
</div>
</body>
</html>
