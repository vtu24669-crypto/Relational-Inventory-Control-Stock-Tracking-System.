<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Verify OTP</title>
</head>

<body>
    <div th:fragment="content">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white p-3 text-center">
                        <h5 class="mb-0">Verify Your Registration</h5>
                    </div>
                    <div class="card-body p-4 text-center">

                        <i class="bi bi-envelope-check display-1 text-primary mb-3"></i>

                        <h4 class="fw-bold">Check Your Email</h4>
                        <p class="text-muted mb-4">We've sent a 6-digit OTP to <strong th:text="${email}">your
                                email</strong>.</p>

                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            Invalid OTP. Please try again.
                        </div>

                        <form th:action="@{/verify-otp}" method="post" id="otpForm"
                            onsubmit="document.getElementById('verifyBtn').disabled = true; document.getElementById('verifyBtn').innerHTML = 'Verifying...';">
                            <input type="hidden" name="email" th:value="${email}" />

                            <div class="mb-4">
                                <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold"
                                    placeholder="------" maxlength="6" required autofocus
                                    style="letter-spacing: 0.5rem; font-size: 1.5rem;">
                            </div>

                            <button type="submit" id="verifyBtn" class="btn btn-primary btn-lg w-100 mb-3">Verify
                                OTP</button>
                        </form>

                        <small class="text-muted">Didn't receive it? Check your spam folder or <a
                                th:href="@{/events}">register again</a>.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
